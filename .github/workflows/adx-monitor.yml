name: ADX Monitor

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force_notify:
        description: "強制LINE通知 (true/false)"
        required: false
        default: "false"

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
       

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Run ADX Monitor
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          FORCE_NOTIFY: ${{ github.event.inputs.force_notify }}
        run: python update_dashboard.py

      - name: Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/
          if git diff --staged --quiet; then
            echo "変更なし、スキップ"
          else
            SCORE=$(python -c "import json; d=json.load(open('data/adx_live.json')); print(d.get('score','—'))")
            git commit -m "📊 ADX update: score=${SCORE} [skip ci]"
            git push
          fi

      - name: Notify on failure
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          if [ -n "$LINE_CHANNEL_ACCESS_TOKEN" ]; then
            curl -s -X POST https://api.line.me/v2/bot/message/broadcast \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $LINE_CHANNEL_ACCESS_TOKEN" \
              -d '{"messages":[{"type":"text","text":"ADX Monitor エラー"}]}'
          fi
